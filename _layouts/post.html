---
layout: default
---
<a class="back-link" href="{{ site.baseurl }}/">&larr; All learnings</a>
<article class="post">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    <span>{{ page.date | date: "%B %d, %Y" }}</span>
    <span class="read-time">{{ page.read_time }}</span>
  </div>
  {% if page.tags %}
  <div class="tag-filters">
    {% for tag in page.tags %}
      <span class="tag-pill">{{ tag }}</span>
    {% endfor %}
  </div>
  {% endif %}

  {% if page.audio %}
  <audio controls src="{{ site.baseurl }}/assets/audio/{{ page.audio }}"></audio>
  {% endif %}

  {{ content }}
</article>
