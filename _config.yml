title: Ankur's Daily Learnings
description: "A 3-5 minute learning byte, every day. Tech, AI, fintech, and whatever sparks curiosity."
baseurl: "/daily-learnings"
url: "https://YOUR_GITHUB_USERNAME.github.io"

theme_color: "#0A2540"
accent_color: "#C9A227"

markdown: kramdown
permalink: /:year/:month/:day/:title/

collections:
  posts:
    output: true

plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-tagging

paginate: 10
paginate_path: "/page:num/"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
